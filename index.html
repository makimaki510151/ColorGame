<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カラーマッチ・シューター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rotate-lock-screen">
        <h2>縦向きでプレイしてください</h2>
        <p>このゲームはスマホ縦画面専用です。端末を縦向きに戻すと再開できます。</p>
    </div>

    <div id="start-screen">
        <h1>カラーマッチ・シューター</h1>
        <p>色を選択し、流れてくる同じ色の敵を撃破しよう！</p>
        <button id="start-button">ゲームスタート</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="color-palette">
            <div class="color-button" data-color="red"></div>
            <div class="color-button" data-color="green"></div>
            <div class="color-button" data-color="blue"></div>
        </div>
        <canvas id="unity-canvas"></canvas>
    </div>

    <div id="game-over-screen" class="hidden">
        <h2>ゲームオーバー</h2>
        <p>スコア: <span id="final-score">0</span></p>
        <p id="game-over-lives-line"></p>
        <button id="restart-button">もう一度プレイ</button>
    </div>

    <div id="score-display" class="hidden">
        残機: <span id="lives-count">2</span> / <span id="lives-max">2</span><br>
        スコア: <span id="current-score">0</span><br>
        コンボ: <span id="combo-count">0</span>
    </div>
    <script src="Build/ColorGame.loader.js"></script>
    <script>
        window.__GAME_ASSET_BASE__ = "Build/";
        const unityCanvas = document.getElementById("unity-canvas");
        const config = {
            dataUrl: "Build/ColorGame.data.gz",
            frameworkUrl: "Build/ColorGame.framework.js.gz",
            codeUrl: "Build/ColorGame.wasm.gz",
            companyName: "nec",
            productName: "ColorGame",
            productVersion: "1.0.0"
        };

        createUnityInstance(unityCanvas, config).catch((message) => {
            alert(message);
        });
    </script>
</body>
</html>
