<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解除用QR（ColorGame-unlock）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 24px; background: #f5f5f5; }
        #qrcode { display: inline-block; padding: 16px; background: #fff; border-radius: 8px; }
        p { color: #333; max-width: 32em; margin: 16px auto; }
        code { background: #eee; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>解除用QRコード</h1>
    <p>このページは <code>script.js</code> の <code>UNLOCK_QR_SECRET</code> と同じ内容（<code>ColorGame-unlock</code>）のQRを表示します。印刷・保存に使えます。</p>
    <p>オフライン用には同梱の <a href="unlock-qr.png"><code>unlock-qr.png</code></a> も利用できます。</p>
    <div id="qrcode"></div>
    <p>カメラが使えない環境では、ゲーム内の「解除コードを手入力」に <strong>ColorGame-unlock</strong> と入力しても解除できます。</p>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "ColorGame-unlock",
            width: 320,
            height: 320,
            correctLevel: QRCode.CorrectLevel.M
        });
    </script>
</body>
</html>
